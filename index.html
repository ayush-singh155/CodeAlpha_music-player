<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARVI Beat Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scene">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
</div>

<div class="container">
    <section class="music-player">
        <div class="player-header">
            <div class="header-copy">
                <span class="eyebrow">Retro Mode</span>
                <h1>ARVI Beat Studio</h1>
            </div>
            <div class="header-actions">
                <button class="icon-btn" aria-label="More options">
                    <i class="fas fa-ellipsis-v"></i>
                </button>
                <button id="theme-toggle" class="icon-btn theme-btn" aria-label="Toggle theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>

        <div class="player-body">
            <div class="player-main">
                <div class="cover-frame">
                    <div class="cover-ring"></div>
                    <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=700" id="cover" alt="Album cover">
                    <div class="cover-glow"></div>
                </div>

                <div class="track-info">
                    <div class="track-header">
                        <span class="eyebrow">Now Playing</span>
                        <h2 id="title">Song One</h2>
                    </div>
                    <p id="artist">Artist Name</p>
                    <p class="subtitle">Pixel-perfect retro beats with animated groove.</p>
                </div>

                <div class="equalizer" id="equalizer">
                    <span class="bar bar-1"></span>
                    <span class="bar bar-2"></span>
                    <span class="bar bar-3"></span>
                    <span class="bar bar-4"></span>
                    <span class="bar bar-5"></span>
                </div>

                <div class="volume-box">
                    <div class="volume-label">
                        <i class="fas fa-volume-low"></i>
                        <span>Volume</span>
                        <span id="volume-percent">100%</span>
                    </div>
                    <div class="volume-track">
                        <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
                        <div class="volume-meter"><div class="volume-fill"></div></div>
                    </div>
                    <div class="volume-actions">
                        <button id="mute-btn" class="icon-btn" aria-label="Mute"><i class="fas fa-volume-high"></i></button>
                        <button id="bass-boost" class="icon-btn" aria-label="Toggle bass boost"><i class="fas fa-bolt"></i></button>
                    </div>
                </div>
                <div class="progress-section">
                    <input type="range" id="progress" min="0" max="100" value="0">
                    <div class="time-labels">
                        <span id="current">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>
                <div class="controls">
                    <button id="prev" class="control-btn" aria-label="Previous track"><i class="fas fa-backward"></i></button>
                    <button id="play" class="control-btn play-btn" aria-label="Play/Pause"><i class="fas fa-play"></i></button>
                    <button id="next" class="control-btn" aria-label="Next track"><i class="fas fa-forward"></i></button>
                </div>
            </div>

            <div class="playlist-panel">
                <div class="playlist-header">
                    <span>Playlist</span>
                    <small>Select a track</small>
                </div>
                <ul id="playlist" class="playlist-list"></ul>
            </div>
        </div>
    </section>
</div>
<audio id="audio"></audio>
<script src="script.js"></script>
</body>
</html>
